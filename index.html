<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>미팅노트 — 대화 분석</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#111111; --paper:#ffffff; --gray:#f4f4f4; --line:#e2e2e2;
  --mute:#888888; --red:#C8102E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
textarea,input{font-family:inherit;font-size:15px}

/* ── 헤더 ── */
header{background:var(--ink);color:#fff;padding:20px 20px 24px;position:relative}
header .brand{font-size:12px;letter-spacing:3px;color:#999;font-weight:600}
header h1{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:4px}
header h1 em{font-style:normal;color:var(--red)}
.userbox{position:absolute;top:20px;right:20px;display:flex;gap:8px;align-items:center}
.userbox button{color:#fff;font-size:12px;border:1px solid #444;padding:6px 12px;border-radius:20px}
.userbox img{width:30px;height:30px;border-radius:50%}

/* ── 탭 ── */
nav{display:flex;border-bottom:2px solid var(--ink)}
nav button{flex:1;padding:14px 0;font-size:15px;font-weight:700;color:var(--mute);border-bottom:3px solid transparent}
nav button.on{color:var(--ink);border-bottom-color:var(--red)}

main{max-width:640px;margin:0 auto;padding:20px 16px 80px}

/* ── 모드 카드 ── */
.modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.mode{border:2px solid var(--ink);padding:16px 14px;text-align:left;background:#fff;transition:all .12s}
.mode .num{font-size:11px;font-weight:700;color:var(--mute);letter-spacing:1px}
.mode .name{font-size:17px;font-weight:800;margin-top:2px}
.mode .desc{font-size:12px;color:var(--mute);margin-top:4px;line-height:1.4}
.mode.on{background:var(--ink);color:#fff}
.mode.on .num{color:var(--red)}
.mode.on .desc{color:#aaa}

/* ── 입력 ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field input[type=text]{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:8px}
.field textarea{width:100%;min-height:200px;padding:12px;border:1.5px solid var(--line);border-radius:8px;resize:vertical;line-height:1.6}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--ink)}
.inputbar{display:flex;gap:8px;margin-bottom:14px}
.inputbar button{flex:1;padding:12px;border:1.5px solid var(--ink);border-radius:8px;font-size:14px;font-weight:700;background:#fff}
.inputbar button.rec-on{background:var(--red);border-color:var(--red);color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{50%{opacity:.7}}
.go{width:100%;padding:16px;background:var(--ink);color:#fff;font-size:16px;font-weight:800;border-radius:10px}
.go:disabled{background:#bbb}

/* ── 결과 ── */
.result{margin-top:24px;border-top:3px solid var(--ink);padding-top:16px;display:none}
.result h2{font-size:22px;font-weight:800;margin-bottom:14px}
.sec{margin-bottom:16px}
.sec h3{font-size:13px;font-weight:800;color:var(--red);letter-spacing:1px;margin-bottom:6px}
.sec ul{list-style:none}
.sec li{padding:8px 12px;background:var(--gray);border-radius:6px;margin-bottom:5px;font-size:14px;line-height:1.55}
.actions{display:flex;gap:8px;margin-top:16px}
.actions button{flex:1;padding:13px;border-radius:8px;font-size:14px;font-weight:700}
.btn-kakao{background:#FEE500;color:#191919}
.btn-line{border:1.5px solid var(--ink);background:#fff}

/* ── 기록 ── */
.histitem{border:1.5px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer}
.histitem:active{background:var(--gray)}
.histitem .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.badge{font-size:11px;font-weight:800;padding:3px 8px;border-radius:4px;background:var(--ink);color:#fff}
.histitem .date{font-size:12px;color:var(--mute)}
.histitem .name{font-size:16px;font-weight:700}
.histitem .preview{font-size:13px;color:var(--mute);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;color:var(--mute);padding:60px 0;font-size:14px}

/* ── 상태/모달 ── */
#status{display:none;text-align:center;padding:24px 0;font-size:14px;font-weight:600}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;margin:0 auto 10px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:420px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:6px}
.modal p{font-size:13px;color:var(--mute);margin-bottom:14px;line-height:1.5}
.modal input{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:8px;margin-bottom:12px}
.modal .go{padding:13px}
#gear{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:#fff;border:1.5px solid var(--line);font-size:20px;box-shadow:0 2px 10px rgba(0,0,0,.1);z-index:10}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:60;display:none}
</style>
</head>
<body>

<header>
  <div class="brand">T.M MEETING NOTE</div>
  <h1>대화를 <em>자산</em>으로.</h1>
  <div class="userbox" id="userbox">
    <button onclick="login()">로그인</button>
  </div>
</header>

<nav>
  <button class="on" onclick="showTab('analyze',this)">분석</button>
  <button onclick="showTab('history',this)">기록</button>
</nav>

<main>
  <!-- 분석 탭 -->
  <section id="tab-analyze">
    <div class="modes" id="modes"></div>

    <div class="field">
      <label id="nameLabel">상대방 이름</label>
      <input type="text" id="personName" placeholder="예: 정명수 대표님">
    </div>

    <div class="inputbar">
      <button id="recBtn" onclick="toggleRec()">🎙 실시간 녹음</button>
      <button onclick="pasteClip()">📋 붙여넣기</button>
    </div>

    <div class="field">
      <label>대화 내용 <span style="color:var(--mute);font-weight:400">(클로바노트 전사 텍스트)</span></label>
      <textarea id="transcript" placeholder="클로바노트에서 복사한 대화 내용을 붙여넣거나, 실시간 녹음을 시작하세요."></textarea>
    </div>

    <button class="go" id="goBtn" onclick="analyze()">분석하기</button>

    <div id="status"><div class="spinner"></div><span id="statusText">분석 중...</span></div>

    <div class="result" id="result">
      <h2 id="resTitle"></h2>
      <div id="resSections"></div>
      <div class="actions">
        <button class="btn-kakao" onclick="copyKakao()">💬 카톡용 복사</button>
        <button class="btn-line" onclick="copyAll()">전체 복사</button>
      </div>
    </div>
  </section>

  <!-- 기록 탭 -->
  <section id="tab-history" style="display:none">
    <div id="histList"><div class="empty">로그인하면 분석 기록이 여기에 저장됩니다.</div></div>
  </section>
</main>

<button id="gear" onclick="openSettings()">⚙️</button>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>설정</h2>
    <p>Gemini API 키를 입력하세요 (무료, aistudio.google.com/apikey 에서 발급). 키는 이 기기 브라우저에만 저장됩니다.</p>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
    <button class="go" onclick="saveSettings()">저장</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════ Firebase ══════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAZoWSGSA81daZydNgzegct2aaeFbDajr0",
  authDomain: "mandu-e7c3c.firebaseapp.com",
  projectId: "mandu-e7c3c",
  storageBucket: "mandu-e7c3c.firebasestorage.app",
  messagingSenderId: "196338490174",
  appId: "1:196338490174:web:78dc77e684945aca362a6f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let user = null;

auth.onAuthStateChanged(u => {
  user = u;
  const box = document.getElementById('userbox');
  box.innerHTML = u
    ? `<img src="${u.photoURL||''}" onerror="this.style.display='none'"><button onclick="auth.signOut()">로그아웃</button>`
    : `<button onclick="login()">로그인</button>`;
  if (document.getElementById('tab-history').style.display !== 'none') loadHistory();
});
function login(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>toast('로그인 실패: '+e.message)); }

/* ══════════ 모드 정의 ══════════ */
const MODES = {
  oto: {
    num:'01', name:'121 원투원', desc:'상생 포인트 · 리퍼럴 키워드', nameLabel:'상대방 이름',
    prompt:`당신은 BNI 비즈니스 네트워킹 전문 분석가입니다. 아래는 BNI 멤버 간 121(원투원) 미팅 대화록입니다.
다음 항목으로 분석하세요:
- 핵심 정보: 상대방의 사업, 강점, 현재 상황 (3~5줄)
- 상생 포인트: 나(디지털명함/앱개발/브랜딩 사업)와 협업 가능한 지점 (2~4줄)
- 리퍼럴 키워드: 이 사람에게 소개해줄 수 있는 고객 유형을 구체적 키워드로 (3~5개)
- 팔로업 액션: 미팅 후 해야 할 구체적 행동 (2~3개)`
  },
  leader: {
    num:'02', name:'리더미팅', desc:'결정사항 · 액션 아이템', nameLabel:'회의명',
    prompt:`당신은 BNI 챕터 운영 전문 서기입니다. 아래는 BNI 리더미팅(LT미팅) 대화록입니다.
다음 항목으로 정리하세요:
- 결정사항: 이번 미팅에서 확정된 내용 (항목별로)
- 액션 아이템: 할 일을 "담당자 — 할 일 — 기한" 형식으로 (기한 언급 없으면 '미정')
- 논의 중 안건: 결론 안 난 사항과 쟁점
- 다음 미팅 안건: 다음에 다뤄야 할 것`
  },
  client: {
    num:'03', name:'고객상담', desc:'DiCA 제작용 정보 추출', nameLabel:'고객 이름',
    prompt:`당신은 디지털명함(DiCA) 제작 전문 카피라이터입니다. 아래는 디지털명함 제작을 위한 고객 상담 대화록입니다.
명함 제작에 필요한 정보를 추출하세요:
- 기본 정보: 이름, 직함, 회사명, 연락처 등 언급된 사실 정보
- 사업 소개 문구: 명함에 들어갈 2~3문장의 소개글 초안 (고객의 말투와 강점 반영)
- 강점 키워드: 명함에 강조할 핵심 키워드 (3~5개)
- 확인 필요: 상담에서 안 나왔지만 명함 제작에 필요한 정보 (누락 항목 리스트)`
  },
  visitor: {
    num:'04', name:'비지터 분석', desc:'상생업종 · 핵심고객 도출', nameLabel:'비지터 이름',
    prompt:`당신은 BNI 비즈니스 네트워킹 전문 분석가입니다. 아래는 BNI 미팅에 방문한 비지터와의 짧은 대화록입니다. 정보가 적어도 업종 지식으로 추론해 채우세요.
다음 항목으로 분석하세요:
- 핵심고객 페르소나: 이 사람의 주 고객은 누구인지 구체적으로 (2~3줄)
- USP: 이 사람 사업의 차별점 추정 (1~2줄)
- 상생업종: BNI에서 이 사람과 시너지 나는 업종 (4~6개, 이유 한 줄씩)
- 리퍼럴 키워드: 이 사람에게 소개 가능한 고객 상황 키워드 (3~5개)`
  }
};
let mode = 'oto';

const modesEl = document.getElementById('modes');
Object.entries(MODES).forEach(([k,m]) => {
  const b = document.createElement('button');
  b.className = 'mode' + (k===mode?' on':'');
  b.innerHTML = `<div class="num">${m.num}</div><div class="name">${m.name}</div><div class="desc">${m.desc}</div>`;
  b.onclick = () => {
    mode = k;
    document.querySelectorAll('.mode').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('nameLabel').textContent = m.nameLabel;
  };
  modesEl.appendChild(b);
});

/* ══════════ 탭 ══════════ */
function showTab(t, btn){
  document.getElementById('tab-analyze').style.display = t==='analyze'?'block':'none';
  document.getElementById('tab-history').style.display = t==='history'?'block':'none';
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if (t==='history') loadHistory();
}

/* ══════════ 실시간 녹음 (Web Speech API) ══════════ */
let recog = null, recording = false, finalText = '';
function toggleRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return toast('이 브라우저는 음성인식을 지원하지 않아요. Chrome을 사용하세요.');
  if (recording) return stopRec();
  recog = new SR();
  recog.lang = 'ko-KR'; recog.continuous = true; recog.interimResults = true;
  const ta = document.getElementById('transcript');
  finalText = ta.value ? ta.value + '\n' : '';
  recog.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    ta.value = finalText + interim;
    ta.scrollTop = ta.scrollHeight;
  };
  recog.onend = () => { if (recording) recog.start(); }; // 침묵으로 끊기면 자동 재시작
  recog.onerror = e => { if (e.error==='not-allowed'){ toast('마이크 권한을 허용해주세요.'); stopRec(); } };
  recog.start();
  recording = true;
  const btn = document.getElementById('recBtn');
  btn.textContent = '⏹ 녹음 중지'; btn.classList.add('rec-on');
}
function stopRec(){
  recording = false;
  if (recog) recog.stop();
  const btn = document.getElementById('recBtn');
  btn.textContent = '🎙 실시간 녹음'; btn.classList.remove('rec-on');
}
async function pasteClip(){
  try {
    const t = await navigator.clipboard.readText();
    const ta = document.getElementById('transcript');
    ta.value = ta.value ? ta.value + '\n' + t : t;
    toast('붙여넣기 완료');
  } catch { toast('클립보드 접근 불가 — 직접 붙여넣어 주세요.'); }
}

/* ══════════ 분석 (Claude API) ══════════ */
let lastResult = null;

async function analyze(){
  const key = localStorage.getItem('geminiApiKey');
  if (!key) { toast('먼저 설정(⚙️)에서 API 키를 입력하세요.'); return openSettings(); }
  const transcript = document.getElementById('transcript').value.trim();
  if (transcript.length < 30) return toast('대화 내용이 너무 짧아요.');
  if (recording) stopRec();

  const name = document.getElementById('personName').value.trim() || '이름 미입력';
  const m = MODES[mode];
  const goBtn = document.getElementById('goBtn');
  goBtn.disabled = true;
  document.getElementById('status').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  const system = m.prompt + `

대상 이름: ${name}
반드시 아래 JSON 형식으로만 응답하세요. 마크다운 백틱, 설명 문장 없이 JSON만 출력합니다:
{"sections":[{"heading":"섹션제목","lines":["항목1","항목2"]}],"kakao":"카카오톡으로 바로 보낼 수 있는 요약 텍스트 (인사말 포함, 이모지 활용, 10줄 이내)"}`;

  try {
    const res = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + key, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: system }] },
        contents: [{ role: 'user', parts: [{ text: transcript.slice(0, 30000) }] }],
        generationConfig: { responseMimeType: 'application/json', maxOutputTokens: 2500 }
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || 'API 오류 ' + res.status);
    }
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.map(p=>p.text).join('') || '';
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());

    lastResult = { mode, name, transcript, parsed };
    renderResult(m.name, name, parsed);
    saveToFirestore(lastResult);
  } catch (e) {
    toast('분석 실패: ' + e.message);
  } finally {
    goBtn.disabled = false;
    document.getElementById('status').style.display = 'none';
  }
}

function renderResult(modeName, name, parsed){
  document.getElementById('resTitle').textContent = `${modeName} · ${name}`;
  const wrap = document.getElementById('resSections');
  wrap.innerHTML = '';
  (parsed.sections||[]).forEach(s => {
    const d = document.createElement('div');
    d.className = 'sec';
    d.innerHTML = `<h3>${esc(s.heading)}</h3><ul>${(s.lines||[]).map(l=>`<li>${esc(l)}</li>`).join('')}</ul>`;
    wrap.appendChild(d);
  });
  document.getElementById('result').style.display = 'block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function copyKakao(){
  if (!lastResult?.parsed?.kakao) return;
  navigator.clipboard.writeText(lastResult.parsed.kakao).then(()=>toast('카톡용 텍스트 복사 완료'));
}
function copyAll(){
  if (!lastResult) return;
  const p = lastResult.parsed;
  const txt = `[${MODES[lastResult.mode].name}] ${lastResult.name}\n\n` +
    (p.sections||[]).map(s=>`■ ${s.heading}\n${(s.lines||[]).map(l=>'- '+l).join('\n')}`).join('\n\n');
  navigator.clipboard.writeText(txt).then(()=>toast('전체 복사 완료'));
}

/* ══════════ Firestore 저장/기록 ══════════ */
async function saveToFirestore(r){
  if (!user) return toast('분석 완료 (로그인하면 기록이 저장됩니다)');
  try {
    await db.collection('meetingNotes').add({
      uid: user.uid,
      mode: r.mode,
      name: r.name,
      transcript: r.transcript.slice(0, 20000),
      result: JSON.stringify(r.parsed),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('분석 완료 · 기록 저장됨');
  } catch(e) { toast('저장 실패: ' + e.message); }
}

async function loadHistory(){
  const list = document.getElementById('histList');
  if (!user) { list.innerHTML = '<div class="empty">로그인하면 분석 기록이 여기에 저장됩니다.</div>'; return; }
  list.innerHTML = '<div class="empty">불러오는 중...</div>';
  try {
    const snap = await db.collection('meetingNotes').where('uid','==',user.uid).get();
    const docs = snap.docs.map(d=>({id:d.id, ...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
    if (!docs.length) { list.innerHTML = '<div class="empty">아직 기록이 없습니다.</div>'; return; }
    list.innerHTML = '';
    docs.forEach(d => {
      const m = MODES[d.mode] || {name:d.mode};
      const date = d.createdAt ? new Date(d.createdAt.seconds*1000).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '';
      const item = document.createElement('div');
      item.className = 'histitem';
      let preview = '';
      try { preview = JSON.parse(d.result).sections?.[0]?.lines?.[0] || ''; } catch{}
      item.innerHTML = `<div class="top"><span class="badge">${m.name}</span><span class="date">${date}</span></div>
        <div class="name">${esc(d.name)}</div><div class="preview">${esc(preview)}</div>`;
      item.onclick = () => {
        try {
          lastResult = { mode:d.mode, name:d.name, transcript:d.transcript, parsed:JSON.parse(d.result) };
          document.querySelector('nav button').click();
          renderResult(m.name, d.name, lastResult.parsed);
        } catch { toast('기록을 여는 데 실패했어요.'); }
      };
      list.appendChild(item);
    });
  } catch(e) { list.innerHTML = `<div class="empty">불러오기 실패: ${esc(e.message)}</div>`; }
}

/* ══════════ 설정/토스트 ══════════ */
function openSettings(){
  document.getElementById('apiKeyInput').value = localStorage.getItem('geminiApiKey')||'';
  document.getElementById('settingsModal').style.display = 'flex';
}
function saveSettings(){
  const k = document.getElementById('apiKeyInput').value.trim();
  if (k) localStorage.setItem('geminiApiKey', k);
  document.getElementById('settingsModal').style.display = 'none';
  toast('저장 완료');
}
document.getElementById('settingsModal').onclick = e => { if(e.target.id==='settingsModal') e.target.style.display='none'; };
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.style.display='none', 2600);
}
</script>
